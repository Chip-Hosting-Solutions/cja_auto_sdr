name: Patch Release Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      require_tag:
        description: "Require local/CI tag verification (v<canonical>) during manual runs"
        type: boolean
        required: false
        default: false

jobs:
  patch-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Verify version, changelog, docs, release tag, and CI tag ref
        env:
          GITHUB_REF: ${{ github.ref }}
          REQUIRE_TAG: ${{ github.event_name == 'push' && 'true' || github.event.inputs.require_tag || 'false' }}
        run: |
          if [ "${REQUIRE_TAG}" = "true" ]; then
            uv run python scripts/check_version_sync.py --require-tag
          else
            echo "INFO: running manual release-gate checks without tag requirement."
            uv run python scripts/check_version_sync.py
          fi
      - name: Verify test counts are up to date
        run: uv run python scripts/update_test_counts.py --check
