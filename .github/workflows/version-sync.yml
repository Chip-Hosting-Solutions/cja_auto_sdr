name: Version Sync

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Verify version strings are in sync
        run: uv run python scripts/check_version_sync.py
